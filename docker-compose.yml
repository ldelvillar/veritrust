services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-veritrust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veritrust}
      POSTGRES_DB: ${POSTGRES_DB:-veritrust}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veritrust}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-veritrust}:${POSTGRES_PASSWORD:-veritrust}@postgres:5432/${POSTGRES_DB:-veritrust}
      OLLAMA_BASE_URL: http://ollama:11434
      FAKE_NEWS_MODEL_PATH: /app/models/bert_classifier
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_ALLOW_CREDENTIALS: "true"
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CLERK_ISSUER: ${CLERK_ISSUER}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE}
    volumes:
      - ./backend/models/bert_classifier:/app/models/bert_classifier:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
