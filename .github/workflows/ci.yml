name: CI

on:
  push:
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/ci.yml
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend_src: ${{ steps.filter.outputs.backend_src }}
      backend_ml: ${{ steps.filter.outputs.backend_ml }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_src:
              - 'backend/src/**'
              - 'backend/requirements.txt'
              - 'backend/pyproject.toml'
              - '.github/workflows/ci.yml'
            backend_ml:
              - 'backend/ml/**'
              - 'backend/data/**'
              - 'backend/requirements.txt'
              - 'backend/pyproject.toml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend_src:
    name: Backend Src Tests (Python)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_src == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CORS_ALLOWED_ORIGINS: "http://localhost"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run src tests with coverage
        run: |
          mkdir -p test-results
          pytest -q src/tests \
            --junitxml=test-results/pytest.xml \
            --cov=src \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/htmlcov

      - name: Upload backend src test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-src-test-results
          path: |
            backend/test-results/pytest.xml
            backend/test-results/coverage.xml
            backend/test-results/htmlcov
          if-no-files-found: warn

  backend_ml:
    name: Backend ML Tests (Python)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_ml == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ml tests with coverage
        run: |
          mkdir -p test-results
          pytest -q ml/tests \
            --junitxml=test-results/pytest-ml.xml \
            --cov=ml \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage-ml.xml \
            --cov-report=html:test-results/htmlcov-ml

      - name: Upload backend ml test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ml-test-results
          path: |
            backend/test-results/pytest-ml.xml
            backend/test-results/coverage-ml.xml
            backend/test-results/htmlcov-ml
          if-no-files-found: warn

  frontend:
    name: Frontend (Next.js)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
