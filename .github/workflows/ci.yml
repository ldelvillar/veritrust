name: CI

on:
  push:
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/ci.yml
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend_app: ${{ steps.filter.outputs.backend_app }}
      backend_ml: ${{ steps.filter.outputs.backend_ml }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_app:
              - 'backend/app/**'
              - 'backend/uv.lock'
              - 'backend/pyproject.toml'
              - '.github/workflows/ci.yml'
            backend_ml:
              - 'backend/ml/**'
              - 'backend/data/**'
              - 'backend/uv.lock'
              - 'backend/pyproject.toml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend_app:
    name: Backend App Tests (Python)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_app == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CORS_ALLOWED_ORIGINS: "http://localhost"
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-path: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check app ml tests

      - name: Format check (ruff)
        run: uv run ruff format --check app ml tests

      - name: Type check (mypy)
        run: uv run mypy

      - name: Run app tests with coverage
        run: |
          mkdir -p test-results
          uv run pytest -q tests \
            --junitxml=test-results/pytest.xml \
            --cov=app \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=html:test-results/htmlcov

      - name: Upload backend app test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-app-test-results
          path: |
            backend/test-results/pytest.xml
            backend/test-results/coverage.xml
            backend/test-results/htmlcov
          if-no-files-found: warn

  backend_ml:
    name: Backend ML Tests (Python)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_ml == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-path: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen --extra ml

      - name: Lint (ruff)
        run: uv run ruff check app ml tests

      - name: Format check (ruff)
        run: uv run ruff format --check app ml tests

      - name: Type check (mypy)
        run: uv run mypy

      - name: Run ml tests with coverage
        run: |
          mkdir -p test-results
          uv run pytest -q ml/tests \
            --junitxml=test-results/pytest-ml.xml \
            --cov=ml \
            --cov-fail-under=80 \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage-ml.xml \
            --cov-report=html:test-results/htmlcov-ml

      - name: Upload backend ml test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ml-test-results
          path: |
            backend/test-results/pytest-ml.xml
            backend/test-results/coverage-ml.xml
            backend/test-results/htmlcov-ml
          if-no-files-found: warn

  frontend:
    name: Frontend (Next.js)
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
